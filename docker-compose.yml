services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: stockmarket-db
    environment:
      POSTGRES_DB: stockmarket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stockmarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  stockmarket:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/stockmarket
      DB_USER: postgres
      DB_PASSWORD: postgres
      EUREKA_URL: http://eureka:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_PORT: 8080
      EUREKA_URL: http://eureka:8761/eureka/
    depends_on:
      eureka:
        condition: service_healthy

volumes:
  postgres_data: