server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: stockmarket-route
          uri: lb://stockmarket
          predicates:
            - Path=/**
          filters:
            - name: Retry
              args:
                retries: 3
                exceptions: java.io.IOException,java.net.ConnectException,java.net.NoRouteToHostException
                methods: GET,POST,PUT,DELETE,PATCH,OPTIONS,HEAD

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
